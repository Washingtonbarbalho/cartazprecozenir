<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cartazes Zenir</title>
    <!-- Importação das Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 350px;
            --bg-color: #f0f2f5;
            --zenir-red: #e30613;
            --zenir-blue: #003399;
            
            /* Variáveis para ajustes finos do valor da parcela */
            --val-font-size: 9;
            --val-letter-spacing: -0.55;
            --val-x: 0;
            --val-y: 0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            min-height: 100vh;
        }

        /* --- PAINEL DE CONTROLE --- */
        #control-panel {
            width: var(--sidebar-width);
            background: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }

        #control-panel::-webkit-scrollbar { width: 6px; }
        #control-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        .header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee; }
        .header h1 { font-size: 1.2rem; color: var(--zenir-blue); }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px;}
        
        .section-title {
            background: #f8f9fa; padding: 5px 10px; font-size: 0.8rem;
            font-weight: bold; margin: 15px 0 10px 0; border-left: 4px solid var(--zenir-blue);
        }

        .btn-print { display: block; width: 100%; padding: 12px; background: var(--zenir-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .btn-print:hover { background: #00267a; }
        .btn-guide { display: block; width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }
        
        details.ajustes-details { margin-top: 25px; border: 1px solid #eee; border-radius: 6px; padding: 5px 10px; background: #fff; }
        details.ajustes-details summary { font-size: 0.8rem; font-weight: bold; color: var(--zenir-red); cursor: pointer; outline: none; padding: 5px 0; user-select: none; }
        .slider-group { margin-bottom: 10px; background: #fafafa; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
        .slider-group label { display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: none; font-size: 0.7rem; }
        .slider-group span { color: var(--zenir-blue); font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn-reset { display: block; width: 100%; padding: 6px; background: #eee; color: #333; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 0.75rem; }

        /* --- ÁREA DO CARTAZ (PREVIEW) --- */
        #preview-area {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            justify-content: center;
            padding: 40px;
            overflow-x: auto;
        }

        /* CONTROLE DE ESCALA PROPORCIONAL (A4, A5, A6) */
        .page {
            --scale: 1; 
            width: calc(21cm * var(--scale)); 
            height: calc(29.7cm * var(--scale)); 
            background: white; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            font-family: 'Oswald', sans-serif;
            overflow: hidden; 
            background-size: 100% 100%; 
            background-repeat: no-repeat; 
            color: #111;
        }
        
        .page.size-A5 { --scale: 0.7071; } 
        .page.size-A6 { --scale: 0.5000; } 

        .show-template {
            background-image: url('https://raw.githubusercontent.com/user-attachments/assets/943dacb8-00cb-4ea6-9b28-62d563da64c5');
            opacity: 0.9;
        }

        /* CAMPOS GERAIS */
        .field { position: absolute; left: calc(1.5cm * var(--scale)); right: calc(1cm * var(--scale)); line-height: 1.2; word-wrap: break-word; }
        
        #field-produto { top: calc(4.6cm * var(--scale)); font-size: calc(1cm * var(--scale)); font-weight: 700; }
        
        /* CAMPO: VALIDADE DA PROMOÇÃO */
        #field-validade {
            top: calc(4.6cm * var(--scale));
            font-family: 'Lato', sans-serif;
            font-size: calc(9pt * var(--scale));
            font-weight: 400;
            text-align: right; 
            color: var(--zenir-red); 
            display: none; 
        }
        
        #field-ref-marca { top: calc(5.8cm * var(--scale)); font-size: calc(0.7cm * var(--scale)); font-weight: 400; }
        #field-ref-marca span.marca { font-weight: 700; }
        #field-caracteristicas { top: calc(6.7cm * var(--scale)); font-size: calc(0.7cm * var(--scale)); font-weight: 700; }
        #field-codigo { top: calc(7.7cm * var(--scale)); font-size: calc(0.7cm * var(--scale)); font-weight: 400; }

        /* BLOCO DE PREÇO */
        #price-block { position: absolute; top: calc(8.5cm * var(--scale)); left: 0; width: 100%; height: calc(9.5cm * var(--scale)); }
        
        #field-parcelas-container {
            position: absolute; left: calc(1cm * var(--scale)); bottom: calc(1.1cm * var(--scale)); display: flex; flex-direction: column;
            line-height: 0.85; font-size: calc(2.2cm * var(--scale)); font-weight: 700; transform: scaleX(0.85); transform-origin: left bottom; text-align: center;
        }
        
        #field-valor-parcela {
            position: absolute; left: 0; width: 100%; bottom: 0; text-align: center;
            transform: scaleX(0.70); transform-origin: center bottom; line-height: 0.8; font-weight: 700;
            font-size: calc(var(--val-font-size) * 1cm * var(--scale)); 
            letter-spacing: calc(var(--val-letter-spacing) * 1cm * var(--scale)); 
            margin-left: calc(var(--val-x) * 1cm * var(--scale)); 
            margin-bottom: calc(var(--val-y) * 1cm * var(--scale));
        }

        /* TOTAIS (RODAPÉ) */
        #field-totais {
            position: absolute; top: calc(20.2cm * var(--scale)); left: calc(1.5cm * var(--scale)); right: calc(1cm * var(--scale));
            border-top: calc(2px * var(--scale)) solid #000; border-bottom: calc(2px * var(--scale)) solid #000; 
            padding: calc(0.1cm * var(--scale)) 0; display: flex; align-items: baseline; justify-content: center; 
        }
        #field-totais span { font-size: calc(0.75cm * var(--scale)); font-weight: 700; }
        #out-tot-praz { margin-right: calc(0.2cm * var(--scale)); }
        #out-v-vis { margin-right: calc(0.2cm * var(--scale)); }
        #field-vista-label { text-transform: uppercase; transition: font-size 0.2s; }
        
        #prazo-text-group { display: inline-flex; flex-direction: column; align-items: center; }
        #field-prazo-label { text-transform: uppercase; font-size: calc(0.75cm * var(--scale)); font-weight: 700; line-height: 1; }
        #field-prazo-sublabel { font-family: 'Lato', sans-serif; font-size: calc(0.28cm * var(--scale)) !important; font-weight: 400 !important; text-transform: none; margin-top: calc(0.1cm * var(--scale)); white-space: nowrap; line-height: 1; }
        .separator { margin: 0 calc(0.8cm * var(--scale)); font-size: calc(0.9cm * var(--scale)) !important; font-weight: 400 !important; }

        /* GARANTIAS PROPORCIONAIS */
        .garantia-item { 
            position: absolute; 
            font-family: 'Lato', sans-serif; font-weight: 400; 
            transition: bottom 0.3s ease, margin-bottom 0.3s ease;
            font-size: calc(9pt * var(--scale));
            bottom: calc(var(--b) * 1cm * var(--scale)); 
            left: calc(var(--l) * 1cm * var(--scale));
        }

        /* --- MODIFICADORES DE TIPO DE CARTAZ (GERAL A4) --- */
        .page.promocional .garantia-item { margin-bottom: calc(0.85cm * var(--scale)); }
        .page.promocional #field-validade { display: block; }

        .page.avista #field-parcelas-container { display: none !important; }
        .page.avista #field-totais { border: none !important; left: 0 !important; right: 0 !important; width: 100% !important; }
        .page.avista #out-tot-praz,
        .page.avista #prazo-text-group,
        .page.avista .separator,
        .page.avista #out-v-vis { display: none !important; }
        .page.avista #field-vista-label { font-size: calc(1.35cm * var(--scale)) !important; }


        /* ===================================================================================
           AJUSTES FINOS DE ALFAIATE: A5 PROMOCIONAL (Parcelado e À Vista)
           =================================================================================== */
        
        .page.size-A5.promocional #field-valor-parcela { bottom: 0.4cm !important; }
        .page.size-A5.promocional #field-totais { margin-top: -0.4cm !important; }

        /* A5 Promocional - Garantias Verticais */
        .page.size-A5.promocional #g1-q, .page.size-A5.promocional #g2-q, .page.size-A5.promocional #g3-q,
        .page.size-A5.promocional #g1-v, .page.size-A5.promocional #g2-v, .page.size-A5.promocional #g3-v {
            bottom: calc((var(--b) * 1cm * var(--scale)) + (0.85cm * var(--scale)) + 0.3cm) !important;
        }
        .page.size-A5.promocional #g1-t, .page.size-A5.promocional #g2-t, .page.size-A5.promocional #g3-t,
        .page.size-A5.promocional #g1-vis, .page.size-A5.promocional #g2-vis, .page.size-A5.promocional #g3-vis {
            /* Desceu 0.1cm */
            bottom: calc((var(--b) * 1cm * var(--scale)) + (0.85cm * var(--scale)) + 0.2cm) !important; 
        }

        /* A5 Promocional - Garantias Horizontais (+1 ano) */
        .page.size-A5.promocional #g1-q { left: calc((6cm * var(--scale)) - 2.9cm) !important; }
        .page.size-A5.promocional #g1-v, .page.size-A5.promocional #g1-t, .page.size-A5.promocional #g1-vis {
            /* Afastou 0.5cm p/ direita relativo ao -2.9cm anterior (-2.9 + 0.5 = -2.4) */
            left: calc((8cm * var(--scale)) - 2.4cm) !important; 
        }

        /* A5 Promocional - Garantias Horizontais (+2 anos -> 4.5cm do g1) */
        .page.size-A5.promocional #g2-q { left: calc(((6cm * var(--scale)) - 2.9cm) + 4.5cm) !important; }
        .page.size-A5.promocional #g2-v, .page.size-A5.promocional #g2-t, .page.size-A5.promocional #g2-vis {
            left: calc(((8cm * var(--scale)) - 2.4cm) + 4.5cm) !important;
        }

        /* A5 Promocional - Garantias Horizontais (+3 anos -> 9cm do g1) */
        .page.size-A5.promocional #g3-q { left: calc(((6cm * var(--scale)) - 2.9cm) + 9.0cm) !important; }
        .page.size-A5.promocional #g3-v, .page.size-A5.promocional #g3-t, .page.size-A5.promocional #g3-vis {
            left: calc(((8cm * var(--scale)) - 2.4cm) + 9.0cm) !important;
        }


        /* ===================================================================================
           AJUSTES FINOS DE ALFAIATE: A6 PADRÃO (Parcelado e À Vista)
           =================================================================================== */
        
        /* Parcelas "R$" 0.25cm a direita (0.1 original + 0.15 extra) */
        .page.size-A6.padrao #field-parcelas-container { margin-left: 0.25cm !important; } 
        
        /* Totais 0.2cm para cima (-0.1 original + -0.1 extra) */
        .page.size-A6.padrao #field-totais { margin-top: -0.2cm !important; } 
        
        /* Quatro linhas de cima (e a validade) 0.4cm direita (0.2 original + 0.2 extra) */
        .page.size-A6.padrao .field { margin-left: 0.4cm !important; } 

        /* A6 Padrão - Garantias Verticais */
        .page.size-A6.padrao #g1-q, .page.size-A6.padrao #g2-q, .page.size-A6.padrao #g3-q,
        .page.size-A6.padrao #g1-v, .page.size-A6.padrao #g2-v, .page.size-A6.padrao #g3-v {
            bottom: calc((var(--b) * 1cm * var(--scale)) + 0.5cm) !important;
        }
        .page.size-A6.padrao #g1-t, .page.size-A6.padrao #g2-t, .page.size-A6.padrao #g3-t,
        .page.size-A6.padrao #g1-vis, .page.size-A6.padrao #g2-vis, .page.size-A6.padrao #g3-vis {
            /* Desceu 0.15cm em relação ao 0.5cm (0.5 - 0.15 = 0.35cm) */
            bottom: calc((var(--b) * 1cm * var(--scale)) + 0.35cm) !important; 
        }

        /* A6 Padrão - Garantias Horizontais (+1 ano) */
        .page.size-A6.padrao #g1-q { left: calc((6cm * var(--scale)) - 1.6cm) !important; }
        .page.size-A6.padrao #g1-v, .page.size-A6.padrao #g1-t, .page.size-A6.padrao #g1-vis {
            /* 0.1cm para a esquerda a partir do -1.6cm original (-1.6 - 0.1 = -1.7cm) */
            left: calc((8cm * var(--scale)) - 1.7cm) !important; 
        }

        /* A6 Padrão - Garantias Horizontais (+2 anos -> 3cm do g1) */
        .page.size-A6.padrao #g2-q { left: calc(((6cm * var(--scale)) - 1.6cm) + 3cm) !important; }
        .page.size-A6.padrao #g2-v, .page.size-A6.padrao #g2-t, .page.size-A6.padrao #g2-vis {
            left: calc(((8cm * var(--scale)) - 1.7cm) + 3cm) !important;
        }

        /* A6 Padrão - Garantias Horizontais (+3 anos -> 6cm do g1) */
        .page.size-A6.padrao #g3-q { left: calc(((6cm * var(--scale)) - 1.6cm) + 6cm) !important; }
        .page.size-A6.padrao #g3-v, .page.size-A6.padrao #g3-t, .page.size-A6.padrao #g3-vis {
            left: calc(((8cm * var(--scale)) - 1.7cm) + 6cm) !important;
        }


        /* 🔴 MOTOR DE IMPRESSÃO BLINDADO E ESCALONÁVEL 🔴 */
        @media print {
            @page { margin: 0; }
            body * { visibility: hidden; }
            #preview-area, #preview-area * { visibility: visible; }
            
            html, body {
                display: block !important;
                background: white !important; margin: 0 !important; padding: 0 !important; 
                height: auto !important; overflow: visible !important;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
            #preview-area {
                position: absolute !important; left: 0 !important; top: 0 !important;
                margin: 0 !important; padding: 0 !important;
                background: transparent !important; overflow: visible !important;
            }
            .page {
                position: absolute !important; left: 0 !important; top: 0 !important;
                margin: 0 !important; padding: 0 !important;
                box-shadow: none !important; border: none !important;
                background-image: none !important; background-color: white !important;
                page-break-inside: avoid !important;
            }
            #control-panel, .print-hide { display: none !important; }
            
            #field-validade { color: #111 !important; } /* Força a data da promo ficar preta na impressão, evite tons claros */
        }
    </style>
</head>
<body>

<div id="control-panel" class="print-hide">
    <div class="header">
        <h1>Zenir Móveis</h1>
        <p style="font-size: 0.7rem; color: #888;">Gerador de Preços - Multi Tamanhos Pro</p>
    </div>

    <!-- Tamanho do Cartaz -->
    <div class="form-group">
        <label>Tamanho da Folha</label>
        <select id="in-tamanho-cartaz" onchange="toggleCartazTipo()" style="border-color: var(--zenir-red); border-width: 2px;">
            <option value="A4">Tamanho A4 (Grande)</option>
            <option value="A5">Tamanho A5 (Médio)</option>
            <option value="A6">Tamanho A6 (Pequeno)</option>
        </select>
    </div>

    <!-- Tipo de Cartaz -->
    <div class="form-group">
        <label>Tipo de Cartaz</label>
        <select id="in-tipo-cartaz" onchange="toggleCartazTipo()">
            <option value="padrao">Padrão (Parcelado)</option>
            <option value="promocional">Promocional (Parcelado)</option>
            <option value="avista_padrao">Padrão (À Vista)</option>
            <option value="avista_promocional">Promocional (À Vista)</option>
        </select>
    </div>

    <!-- Data da Promoção -->
    <div class="form-group">
        <label style="color: var(--zenir-red);">Validade da Promoção</label>
        <input type="text" id="in-validade" placeholder="Válido de 10/10 até 20/10" oninput="update()">
    </div>

    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

    <!-- Informações Iniciais -->
    <div class="form-group"><label>Produto</label><input type="text" id="in-produto" oninput="update()"></div>
    <div class="grid-2">
        <div class="form-group"><label>Referência</label><input type="text" id="in-ref" oninput="update()"></div>
        <div class="form-group"><label>Marca (Negrito)</label><input type="text" id="in-marca" oninput="update()"></div>
    </div>
    <div class="form-group"><label>Características</label><textarea id="in-carac" rows="2" oninput="update()"></textarea></div>
    <div class="form-group"><label>Código</label><input type="text" id="in-codigo" oninput="update()"></div>

    <!-- Valores -->
    <div class="section-title">Valores e Condições (Cálculo Auto)</div>
    <div class="form-group">
        <label>Condição de Pagamento</label>
        <select id="in-condicao" onchange="autoCalcular()">
            <option value="carne">Carnê</option>
            <option value="cartao_fator">Cartão (com fator)</option>
            <option value="cartao_sem_juros">Cartão (sem juros)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Vl. à Vista (R$) <span style="font-size: 10px; color: #aaa; text-transform: none;">- Digite para calcular</span></label>
        <input type="text" id="in-v-vis" placeholder="529,00" oninput="autoCalcular()">
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Parcelas (1 a 12)</label>
            <input type="text" id="in-parcelas" placeholder="12" oninput="autoCalcular()">
        </div>
        <div class="form-group">
            <label>Vl. Parcela (R$)</label>
            <input type="text" id="in-v-parc" oninput="update()">
        </div>
    </div>
    <div class="form-group">
        <label>Total a Prazo (R$)</label>
        <input type="text" id="in-tot-praz" oninput="update()">
    </div>

    <!-- Garantias -->
    <div class="section-title">Garantias Estendidas</div>
    
    <label>+ 1 ANO</label>
    <div class="grid-3">
        <input type="text" id="in-g1-q" placeholder="Qtd" oninput="update()">
        <input type="text" id="in-g1-v" placeholder="Parcela" oninput="update()">
        <input type="text" id="in-g1-t" placeholder="Total/Vista" oninput="update()">
    </div>

    <label>+ 2 ANOS</label>
    <div class="grid-3">
        <input type="text" id="in-g2-q" placeholder="Qtd" oninput="update()">
        <input type="text" id="in-g2-v" placeholder="Parcela" oninput="update()">
        <input type="text" id="in-g2-t" placeholder="Total/Vista" oninput="update()">
    </div>

    <label>+ 3 ANOS</label>
    <div class="grid-3">
        <input type="text" id="in-g3-q" placeholder="Qtd" oninput="update()">
        <input type="text" id="in-g3-v" placeholder="Parcela" oninput="update()">
        <input type="text" id="in-g3-t" placeholder="Total/Vista" oninput="update()">
    </div>

    <!-- BOTÕES PRINCIPAIS -->
    <button class="btn-print" onclick="window.print()">IMPRIMIR CARTAZ</button>
    <button class="btn-guide" onclick="toggleGuide()">MOSTRAR/OCULTAR GUIA</button>

    <!-- AJUSTES FINOS OCULTOS -->
    <details class="ajustes-details">
        <summary>Ajustes Finos (Valor Centro)</summary>
        <div style="padding-top: 10px;">
            <div class="slider-group">
                <label>Tamanho da Fonte <span id="lbl-size">9.0cm</span></label>
                <input type="range" id="adj-size" min="5" max="13" step="0.1" value="9" oninput="applyAdjustments()">
            </div>
            <div class="slider-group">
                <label>Aproximar Letras <span id="lbl-spacing">-0.55cm</span></label>
                <input type="range" id="adj-spacing" min="-1.5" max="0" step="0.05" value="-0.55" oninput="applyAdjustments()">
            </div>
            <div class="slider-group">
                <label>Posição Horizontal <span id="lbl-x">0.0cm</span></label>
                <input type="range" id="adj-x" min="-5" max="5" step="0.1" value="0" oninput="applyAdjustments()">
            </div>
            <div class="slider-group">
                <label>Posição Vertical <span id="lbl-y">0.0cm</span></label>
                <input type="range" id="adj-y" min="-3" max="5" step="0.1" value="0" oninput="applyAdjustments()">
            </div>
            <button class="btn-reset" onclick="resetAdjustments()">Restaurar Padrão</button>
        </div>
    </details>
</div>

<div id="preview-area">
    <div id="cartaz" class="page size-A4 padrao">
        <!-- Textos Superiores -->
        <div id="field-produto" class="field"></div>
        <div id="field-validade" class="field"></div> 
        
        <div id="field-ref-marca" class="field"><span id="out-ref"></span> <span id="out-marca" class="marca"></span></div>
        <div id="field-caracteristicas" class="field"></div>
        <div id="field-codigo" class="field"></div>

        <!-- BLOCO CENTRAL -->
        <div id="price-block">
            <div id="field-parcelas-container"><span id="out-parcelas"></span><span>R$</span></div>
            <div id="field-valor-parcela"></div>
        </div>

        <!-- TOTAIS -->
        <div id="field-totais">
            <span id="out-tot-praz"></span>
            <div id="prazo-text-group">
                <span id="field-prazo-label">À PRAZO</span>
                <span id="field-prazo-sublabel">6,9% a.m. e 122,71% a.a.</span>
            </div>
            <span class="separator">|</span>
            <span id="out-v-vis"></span>
            <span id="field-vista-label">À VISTA</span>
        </div>

        <!-- GARANTIAS -->
        <div class="garantia-item" style="--b: 3.5; --l: 6;" id="g1-q"></div>
        <div class="garantia-item" style="--b: 3.5; --l: 8;" id="g1-v"></div>
        <div class="garantia-item" style="--b: 3.0; --l: 8;" id="g1-t"></div>
        <div class="garantia-item" style="--b: 2.5; --l: 8;" id="g1-vis"></div>
        
        <div class="garantia-item" style="--b: 3.5; --l: 11;" id="g2-q"></div>
        <div class="garantia-item" style="--b: 3.5; --l: 13;" id="g2-v"></div>
        <div class="garantia-item" style="--b: 3.0; --l: 13;" id="g2-t"></div>
        <div class="garantia-item" style="--b: 2.5; --l: 13;" id="g2-vis"></div>
        
        <div class="garantia-item" style="--b: 3.5; --l: 16;" id="g3-q"></div>
        <div class="garantia-item" style="--b: 3.5; --l: 18;" id="g3-v"></div>
        <div class="garantia-item" style="--b: 3.0; --l: 18;" id="g3-t"></div>
        <div class="garantia-item" style="--b: 2.5; --l: 18;" id="g3-vis"></div>
    </div>
</div>

<script>
    const FATORES = {
        carne: {
            1: 1.0690, 2: 0.5523, 3: 0.3804, 4: 0.2946, 5: 0.2432, 6: 0.2091, 
            7: 0.1849, 8: 0.1668, 9: 0.1528, 10: 0.1417, 11: 0.1327, 12: 0.1252
        },
        cartao_fator: {
            1: 1.0292, 2: 0.5220, 3: 0.3530, 4: 0.2685, 5: 0.2179, 6: 0.1841, 
            7: 0.1600, 8: 0.1420, 9: 0.1280, 10: 0.1168, 11: 0.1076, 12: 0.1000
        }
    };

    function getTextVal(id) { const el = document.getElementById(id); return el ? el.value : ""; }
    function setSafeText(id, text) { const el = document.getElementById(id); if (el) el.innerText = text; }

    function parseMoney(str) {
        if (!str) return 0;
        let clean = str.replace(/\./g, '').replace(',', '.');
        return parseFloat(clean.replace(/[^\d.]/g, '')) || 0;
    }

    function formatMoney(num) {
        return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function autoCalcular() {
        const condicao = getTextVal('in-condicao');
        const parcelasStr = getTextVal('in-parcelas');
        const vistaStr = getTextVal('in-v-vis');

        if (!parcelasStr || !vistaStr) { update(); return; }

        const parcelas = parseInt(parcelasStr, 10);
        const vista = parseMoney(vistaStr);

        if (isNaN(parcelas) || isNaN(vista) || parcelas < 1) { update(); return; }

        let valorParcela = 0;

        if (condicao === 'cartao_sem_juros') {
            valorParcela = vista / parcelas;
        } else {
            const fator = FATORES[condicao][parcelas];
            if (fator) { valorParcela = vista * fator; } else { update(); return; }
        }

        if (condicao === 'carne' && parcelas === 12) {
            let cents = Math.round(valorParcela * 100);
            let baseCents = cents - 90; 
            let targetCents = Math.floor(baseCents / 100) * 100 + 90;
            valorParcela = targetCents / 100;
        } else {
            valorParcela = Math.round(valorParcela * 100) / 100;
        }

        const totalPrazo = valorParcela * parcelas;

        document.getElementById('in-v-parc').value = formatMoney(valorParcela);
        document.getElementById('in-tot-praz').value = formatMoney(totalPrazo);

        update();
    }

    function update() {
        if (!document.getElementById('field-produto')) return; 

        setSafeText('field-produto', getTextVal('in-produto'));
        
        setSafeText('field-validade', getTextVal('in-validade'));

        setSafeText('out-ref', getTextVal('in-ref'));
        setSafeText('out-marca', getTextVal('in-marca'));
        setSafeText('field-caracteristicas', getTextVal('in-carac'));
        setSafeText('field-codigo', getTextVal('in-codigo'));
        
        const parcelas = getTextVal('in-parcelas');
        setSafeText('out-parcelas', parcelas ? parcelas + 'x' : '');
        
        const tipoCartaz = getTextVal('in-tipo-cartaz');
        if (tipoCartaz === 'avista_padrao' || tipoCartaz === 'avista_promocional') {
            setSafeText('field-valor-parcela', getTextVal('in-v-vis'));
        } else {
            setSafeText('field-valor-parcela', getTextVal('in-v-parc'));
        }
        
        const totalP = getTextVal('in-tot-praz');
        setSafeText('out-tot-praz', totalP ? '= R$ ' + totalP : '');
        
        const totalV = getTextVal('in-v-vis');
        setSafeText('out-v-vis', totalV ? 'R$ ' + totalV : '');

        const condicao = getTextVal('in-condicao');
        const prazoLabel = document.getElementById('field-prazo-label');
        const prazoSubLabel = document.getElementById('field-prazo-sublabel');

        if (prazoLabel && prazoSubLabel) {
            if (condicao === 'carne') {
                prazoLabel.innerText = 'À PRAZO';
                prazoSubLabel.innerText = '6,9% a.m. e 122,71% a.a.';
                prazoSubLabel.style.display = 'block';
            } else if (condicao === 'cartao_fator') {
                prazoLabel.innerText = 'NO CARTÃO';
                prazoSubLabel.innerText = '2,92% a.m. e 41,25% a.a.';
                prazoSubLabel.style.display = 'block';
            } else if (condicao === 'cartao_sem_juros') {
                prazoLabel.innerText = 'NO CARTÃO';
                prazoSubLabel.innerText = 'sem juros';
                prazoSubLabel.style.display = 'block';
            }
        }

        for (let i = 1; i <= 3; i++) {
            setSafeText(`g${i}-q`, getTextVal(`in-g${i}-q`));
            setSafeText(`g${i}-v`, getTextVal(`in-g${i}-v`));
            setSafeText(`g${i}-t`, getTextVal(`in-g${i}-t`));
            setSafeText(`g${i}-vis`, getTextVal(`in-g${i}-t`));
        }
    }

    function applyAdjustments() {
        if (!document.getElementById('lbl-size')) return; 

        const size = getTextVal('adj-size') || 9;
        const spacing = getTextVal('adj-spacing') || -0.55;
        const x = getTextVal('adj-x') || 0;
        const y = getTextVal('adj-y') || 0;

        setSafeText('lbl-size', Number(size).toFixed(1) + 'cm');
        setSafeText('lbl-spacing', Number(spacing).toFixed(2) + 'cm');
        setSafeText('lbl-x', Number(x).toFixed(1) + 'cm');
        setSafeText('lbl-y', Number(y).toFixed(1) + 'cm');

        document.documentElement.style.setProperty('--val-font-size', size);
        document.documentElement.style.setProperty('--val-letter-spacing', spacing);
        document.documentElement.style.setProperty('--val-x', x);
        document.documentElement.style.setProperty('--val-y', y);
    }

    function resetAdjustments() {
        const els = ['adj-size', 'adj-spacing', 'adj-x', 'adj-y'];
        const values = [9, -0.55, 0, 0];
        els.forEach((id, i) => { let el = document.getElementById(id); if(el) el.value = values[i]; });
        applyAdjustments();
    }

    function toggleGuide() {
        const cartaz = document.getElementById('cartaz');
        if (cartaz) cartaz.classList.toggle('show-template');
    }

    function toggleCartazTipo() {
        const tamanho = getTextVal('in-tamanho-cartaz');
        const tipo = getTextVal('in-tipo-cartaz');
        const cartaz = document.getElementById('cartaz');
        if (!cartaz) return;
        
        cartaz.classList.remove('promocional', 'avista', 'padrao', 'size-A4', 'size-A5', 'size-A6');
        cartaz.classList.add('size-' + tamanho);

        if (tipo === 'padrao') {
            cartaz.classList.add('padrao');
        } else if (tipo === 'promocional') {
            cartaz.classList.add('promocional');
        } else if (tipo === 'avista_padrao') {
            cartaz.classList.add('avista', 'padrao');
        } else if (tipo === 'avista_promocional') {
            cartaz.classList.add('avista', 'promocional');
        }
        update();
    }

    function iniciarSistema() {
        if (document.getElementById('in-produto')) {
            document.getElementById('in-produto').value = "Mesa Computador";
            document.getElementById('in-validade').value = "Válido de 10/10 até 20/10";
            document.getElementById('in-ref').value = "Morada";
            document.getElementById('in-marca').value = "Demobile";
            document.getElementById('in-carac').value = "Com Armário | MDP | 1 Gaveta | 1 Porta";
            document.getElementById('in-codigo').value = "47661";
            document.getElementById('in-condicao').value = "carne";
            document.getElementById('in-v-vis').value = "529,00";
            document.getElementById('in-parcelas').value = "12";
            document.getElementById('in-g1-q').value = "3";
            document.getElementById('in-g1-v').value = "24,45";
            document.getElementById('in-g1-t').value = "73,34";
        }
        autoCalcular(); toggleCartazTipo(); applyAdjustments();
    }

    document.addEventListener('DOMContentLoaded', iniciarSistema);
    setTimeout(iniciarSistema, 150);
</script>

</body>
</html>
